# ==============================================================================
# JURUS Level 1 (Analyst) - Domain 4: Application Security
# Nginx Secure Reverse Proxy Configuration (TLS 1.3 & Security Headers)
# ==============================================================================

# User configuration
user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 1. Hide software version banner (Domain 4 requirement)
    server_tokens off;

    # Basic logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Performance configurations
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # 2. Upload Size Restriction
    client_max_body_size 10M; # Enforce 10MB limits matching server.js upload config

    # Rate limiting to prevent brute-force attacks on login
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/s;

    # UPSTREAM APPLICATION SERVER
    upstream app_backend {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    # HTTP Redirect to HTTPS
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name portal.jurus.edu.my;
        return 301 https://$host$request_uri;
    }

    # HTTPS Secure Server
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name portal.jurus.edu.my;

        # SSL Certificates (Self-Signed or Let's Encrypt certificates path)
        ssl_certificate /etc/ssl/certs/jurus_portal.crt;
        ssl_certificate_key /etc/ssl/private/jurus_portal.key;

        # 3. SSL Protocol Hardening (Only TLSv1.3 allowed, Usang/Legacy protocols disabled)
        ssl_protocols TLSv1.3;
        ssl_prefer_server_ciphers off; # TLSv1.3 handles ciphers automatically

        # Session cache and tickets
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        # 4. Enforce HTTP Security Headers (Domain 4 requirements check)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Reverse Proxy to Node.js Backend Application
        location / {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            
            # Connection settings for websocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            
            # Pass original request metadata to application
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 8k;
        }

        # Route rate limiting for login page
        location /api/auth/login {
            limit_req zone=login_limit burst=10 nodelay;
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Custom error page
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
